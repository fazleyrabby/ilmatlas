services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edubase_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    env_file:
      - .env
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - edubase

  mysql:
    image: mysql:8.0
    container_name: edubase_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-edubase}
      MYSQL_USER: ${DB_USERNAME:-edubase}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edubase

  redis:
    image: redis:7-alpine
    container_name: edubase_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - edubase

volumes:
  mysql_data:
  redis_data:

networks:
  edubase:
    driver: bridge
