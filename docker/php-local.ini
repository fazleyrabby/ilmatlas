; PHP configuration for Docker container

sys_temp_dir = /var/www/html/storage/tmp
upload_tmp_dir = /var/www/html/storage/tmp

memory_limit = 256M
upload_max_filesize = 100M
post_max_size = 100M
max_execution_time = 300
max_input_time = 300

; OpCache settings
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000

; Realpath cache
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Error reporting
display_errors = Off
log_errors = On
error_log = /var/log/nginx/php_errors.log
